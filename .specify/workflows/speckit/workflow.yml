schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Full SDD Cycle"
  version: "1.0.0"
  author: "GitHub"
  description: "Runs specify → plan → tasks → implement with review gates"

requires:
  speckit_version: ">=0.6.1"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  feature_name:
    type: string
    required: true
    prompt: "Feature name (Used for branch generation, e.g., login-system)"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only"]

steps:
  - id: git-setup
    type: shell
    command: |
      git checkout master
      git pull origin master
      git checkout -b feat/{{ inputs.feature_name }}

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-implementation    
    type: gate
    message: "Verifique o código entregue e os testes. Podemos preparar o commit para o Github Flow?"
    options: [approve, reject]
    on_reject: abort

  - id: git-commit-stage
    type: shell
    command: |
      git add .
      git commit -m "feat: implement {{ inputs.feature_name }}"
      git push -u origin feat/{{ inputs.feature_name }}
