name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        # SEC-015 (FR-038): Fail the build on any high or critical vulnerability.
        # Moderate and low are informational — threshold can be tightened when
        # the full vulnerability backlog is cleared.
        run: pnpm audit --audit-level=high

      - name: Linter Check
        run: pnpm run lint

      - name: Type Check & Build
        run: |
          pnpm run db:generate
          pnpm run build
        
      # Placeholder for actual test runners when implemented in the shared-testing bundle
      # - name: Run Unit & Integration Tests (Coverage > 80%)
      #   run: pnpm run test --coverage
