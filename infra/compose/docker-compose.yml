version: '3.8'

services:
  gateway:
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - EXAMPLE_SERVICE_URL=http://example-service:3001
    depends_on:
      - example-service
    networks:
      - forgekit-net

  example-service:
    build:
      context: ../../
      dockerfile: apps/services/example-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://forgekit:secret@postgres:5432/example_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - forgekit-net


  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forgekit
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=example_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgekit -d example_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forgekit-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=forgekit
      - RABBITMQ_DEFAULT_PASS=secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forgekit-net

networks:
  forgekit-net:
    driver: bridge
