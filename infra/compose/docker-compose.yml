name: forgekit

services:
  gateway:
    container_name: forgekit-gateway
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    ports:
      # SEC-012: Only the gateway port is exposed to the host. The gateway is the
      # intended public entry point; all other services must be accessed through it.
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - EXAMPLE_SERVICE_URL=http://example-service:3001
    depends_on:
      - example-service
    networks:
      - forgekit-net

  example-service:
    container_name: forgekit-example-service
    build:
      context: ../../
      dockerfile: apps/services/example-service/Dockerfile
    # SEC-012: No ports exposed to the host. Access only via the gateway on port 3000
    # or through the internal Docker bridge network (forgekit-net).
    # For local development access, use docker-compose.override.yml.
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://forgekit:secret@postgres:5432/example_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - forgekit-net

  postgres:
    container_name: forgekit-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forgekit
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=example_db
    # SEC-012: No ports exposed to the host. Accessible only within forgekit-net.
    # For local development access, use docker-compose.override.yml.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgekit -d example_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forgekit-net

  rabbitmq:
    container_name: forgekit-rabbitmq
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=forgekit
      - RABBITMQ_DEFAULT_PASS=secret
    # SEC-012: No ports exposed to the host. Accessible only within forgekit-net.
    # For local development access (AMQP + management UI), use docker-compose.override.yml.
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - forgekit-net

networks:
  forgekit-net:
    driver: bridge
